<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Industrial Rental Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div id="auth-overlay" class="fixed inset-0 bg-slate-900 z-[200] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
            <div class="text-center mb-8">
                <h2 id="auth-title" class="text-3xl font-bold text-slate-800">Welcome Back</h2>
                <p id="auth-subtitle" class="text-slate-500 mt-2">Please enter your details to manage inventory</p>
            </div>

            <form id="auth-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                    <input type="text" id="auth-email" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-slate-800 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                    <input type="password" id="auth-password" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-slate-800 outline-none">
                </div>
                <button type="submit" id="auth-submit-btn" class="w-full bg-slate-800 text-white py-3 rounded-lg font-bold hover:bg-slate-700 transition mt-6">
                    Login
                </button>
            </form>
        </div>
    </div>

    <div id="notification-container" class="fixed bottom-5 right-5 z-[100] flex flex-col gap-3"></div>
    <nav class="bg-slate-800 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                Industrial Equipment Manager
            </h1>
            <div>
                Name: <span id="user-name-display" class="font-semibold"></span> |
                Role: <span id="user-role-display" class="font-semibold"></span>
            </div>
        </div>
    </nav>

    <nav id="navBar" class=" bg-white border-b border-slate-200 sticky top-0 z-50">
    </nav>

    <main id="main-content" class="container mx-auto py-8 px-4">
        <div class="flex items-center justify-center h-64">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-slate-800"></div>
        </div>
    </main>

    <div id="canva-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full overflow-hidden transform transition-all">
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 id="modal-title" class="text-xl font-bold text-slate-800">Modal Title</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div id="modal-body" class="p-6">
                </div>
        </div>
    </div>

    <div id="rental-modal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-50 flex items-center justify-center z-50 p-4">
    
</div>

<script src="script.js"></script>
</body>
</html>
