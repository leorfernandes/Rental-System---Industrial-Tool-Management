<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Industrial Rental Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div id="auth-overlay" class="fixed inset-0 bg-slate-900 z-[200] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
            <div class="text-center mb-8">
                <h2 id="auth-title" class="text-3xl font-bold text-slate-800">Welcome Back</h2>
                <p id="auth-subtitle" class="text-slate-500 mt-2">Please enter your details to manage inventory</p>
            </div>

            <form id="auth-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Username</label>
                    <input type="text" id="auth-username" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-slate-800 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                    <input type="password" id="auth-password" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-slate-800 outline-none">
                </div>
                <button type="submit" id="auth-submit-btn" class="w-full bg-slate-800 text-white py-3 rounded-lg font-bold hover:bg-slate-700 transition mt-6">
                    Login
                </button>
            </form>

            <div class="mt-6 text-center">
                <button id="toggle-auth" class="text-sm text-slate-600 hover:text-slate-800 underline">
                    Need an account? Register here.
                </button>
            </div>
        </div>
    </div>

    <div id="notification-container" class="fixed bottom-5 right-5 z-[100] flex flex-col gap-3"></div>
    <nav class="bg-slate-800 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                <span>🛠️</span> Industrial Equipment Manager
            </h1>
            <div id="connection-status" class="text-xs bg-green-500 px-2 py-1 rounded">System Online</div>
        </div>
    </nav>

    <nav id="tab-nav" class=" bg-white border-b border-slate-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 flex space-x-8">
            <button onclick="switchTab('inventory')" id="tab-inventory" class="py-4 px-2 border-b-2 border-slate-800 font-medium text-slate-800">
                📦 Inventory
            </button>
            <button onclick="switchTab('analytics')" id="tab-analytics" class="hidden py-4 px-2 border-b-2 border-transparent font-medium text-slate-500 hover:text-slate-700">
                📊 Analytics
            </button>
            <button onclick="switchTab('users')" id="tab-users" class="hidden py-4 px-2 border-b-2 border-transparent font-medium text-slate-500 hover:text-slate-700">
                👥 User Management
            </button>
            <div class="flex-grow"></div>
            <button onclick="logout()" class="py-4 px-2 text-red-600 font-medium hover:text-red-800">
                Logout
            </button>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-extrabold text-slate-700">Live Inventory</h2>
            <button onclick="loadAssets()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded shadow transition">
                Refresh Data
            </button>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-md mb-8 max-w-2xl mx-auto">
            <h3 class="text-center font-bold text-gray-700 mb-4">Inventory Distribution</h3>
            <canvas id="inventoryChart"></canvas>
        </div>

        <div id="asset-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <p class="text-gray-500 italic">Connecting to inventory database...</p>
        </div>
    </main>

    <div id="rental-modal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-xl shadow-2xl max-w-md w-full p-8">
        <h3 class="text-2xl font-bold text-gray-800 mb-2">Rent Equipment</h3>
        <p id="modal-asset-name" class="text-gray-500 mb-6 font-medium"></p>
        
        <form id="rental-form" class="space-y-4">
            <input type="hidden" id="modal-asset-id">
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Customer Name</label>
                <input type="text" id="customer-name" required 
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Return Date</label>
                <input type="date" id="return-date" required 
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <div class="flex gap-3 pt-4">
                <button type="button" onclick="closeModal()" 
                    class="flex-1 px-4 py-2 border border-gray-300 rounded-lg font-semibold hover:bg-gray-50 transition">Cancel</button>
                <button type="submit" 
                    class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 transition">Confirm Rental</button>
            </div>
        </form>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
