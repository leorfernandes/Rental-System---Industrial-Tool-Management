<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Industrial Rental Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div id="notification-container" class="fixed bottom-5 right-5 z-[100] flex flex-col gap-3"></div>
    <nav class="bg-slate-800 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                <span>🛠️</span> Industrial Equipment Manager
            </h1>
            <div id="connection-status" class="text-xs bg-green-500 px-2 py-1 rounded">System Online</div>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-extrabold text-slate-700">Live Inventory</h2>
            <button onclick="loadAssets()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded shadow transition">
                Refresh Data
            </button>
        </div>

        <div id="asset-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <p class="text-gray-500 italic">Connecting to inventory database...</p>
        </div>
    </main>

    <div id="rental-modal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-xl shadow-2xl max-w-md w-full p-8">
        <h3 class="text-2xl font-bold text-gray-800 mb-2">Rent Equipment</h3>
        <p id="modal-asset-name" class="text-gray-500 mb-6 font-medium"></p>
        
        <form id="rental-form" class="space-y-4">
            <input type="hidden" id="modal-asset-id">
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Customer Name</label>
                <input type="text" id="customer-name" required 
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Return Date</label>
                <input type="date" id="return-date" required 
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <div class="flex gap-3 pt-4">
                <button type="button" onclick="closeModal()" 
                    class="flex-1 px-4 py-2 border border-gray-300 rounded-lg font-semibold hover:bg-gray-50 transition">Cancel</button>
                <button type="submit" 
                    class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 transition">Confirm Rental</button>
            </div>
        </form>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
