name: Jest Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    # 🍃 MongoDB Service Container
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run Jest tests
      env:
        NODE_ENV: test
        MONGO_USER: ""
        MONGO_PASS: ""
        MONGO_HOST: "localhost:27017"
        MONGO_APP_NAME: Cluster0
        MONGO_DB: "Rental_Test_DB"
        
        MY_PORT: 8888
        PORT: 8888
        JWT_SECRET: "super_secret_test_key_123"
        SESSION_SECRET: "test_session_secret_999"
      run: npm test -- --runInBand --forceExit